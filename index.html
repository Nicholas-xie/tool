<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>万能朋友圈文案生成器 - 自动生成高级文案</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;font-family:system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial}
    body{background:#f6f7f9;padding:20px;max-width:600px;margin:0 auto}
    .card{background:white;border-radius:16px;padding:24px;margin-bottom:20px;box-shadow:0 2px 12px rgba(0,0,0,.06)}
    h1{font-size:22px;margin-bottom:16px;color:#222}
    p{color:#555;margin-bottom:12px}
    select,textarea,button{width:100%;padding:14px;border-radius:10px;border:1px solid #ddd;font-size:15px;margin-bottom:12px}
    button{background:#1677ff;color:white;border:none;font-weight:500;cursor:pointer}
    button:active{background:#0c5dcd}
    .result{background:#f0f7ff;padding:16px;border-radius:12px;white-space:pre-wrap;line-height:1.6}
    .tip{font-size:12px;color:#888;margin-top:8px}
  </style>
</head>
<body>
<div class="card">
  <h1>万能朋友圈文案生成器</h1>
  <p>选择场景，一键生成高级、干净、不尴尬的文案</p>

  <select id="type">
    <option value="日常">日常随手拍</option>
    <option value="美食">美食探店</option>
    <option value="旅行">旅行风景</option>
    <option value="工作">工作职场</option>
    <option value="心情">心情感悟</option>
    <option value="节日">节日祝福</option>
    <option value="晒娃">晒娃可爱</option>
    <option value="健身">健身运动</option>
  </select>

  <textarea id="desc" placeholder="简单写几句：比如吃了火锅、看了日落、今天很开心…"></textarea>
  <button onclick="generate()">一键生成文案</button>
</div>

<div class="card" id="resultBox" style="display:none">
  <p>生成好的文案（直接复制）</p>
  <div class="result" id="result"></div>
  <p class="tip">每天可用无限次，做自己的朋友圈博主</p>
</div>

<script>
function generate(){
  const type = document.getElementById('type').value
  const desc = document.getElementById('desc').value
  const resultBox = document.getElementById('resultBox')
  const result = document.getElementById('result')

  const texts = {
    日常: [
      `生活慢慢走，美好自然有。${desc}`,
      `普通日子里的小浪漫，${desc}`,
      `记录此刻，开心就好。${desc}`
    ],
    美食: [
      `人间烟火气，最抚凡人心。${desc}`,
      `吃饱喝足，没有烦恼。${desc}`,
      `美食治愈一切，今日快乐达成。${desc}`
    ],
    旅行: [
      `去看山看海，去遇见更好的自己。${desc}`,
      `风是自由的，我也是。${desc}`,
      `脚步不停，风景无限。${desc}`
    ],
    工作: [
      `认真生活，努力工作，不负自己。${desc}`,
      `稳步前进，慢慢发光。${desc}`,
      `今日份努力已上线。${desc}`
    ],
    心情: [
      `允许一切发生，允许自己慢慢来。${desc}`,
      `心态安好，便是晴天。${desc}`,
      `安静自在，便是生活最好的状态。${desc}`
    ],
    节日: [
      `岁岁常欢愉，万事皆胜意。${desc}`,
      `日子滚烫，快乐至上。${desc}`,
      `节日快乐，平安喜乐。${desc}`
    ],
    晒娃: [
      `小小的你，治愈我所有的疲惫。${desc}`,
      `慢慢长大，平安快乐就好。${desc}`,
      `你是生活送给我最甜的糖。${desc}`
    ],
   健身: [
      `汗水不会骗人，坚持自有答案。${desc}`,
      `自律给我自由。${desc}`,
      `慢慢变好，是给自己最好的礼物。${desc}`
    ]
  }

  const list = texts[type]
  const pick = list[Math.floor(Math.random()*list.length)]
  result.innerText = pick
  resultBox.style.display = 'block'
}
</script>
</body>
</html>
